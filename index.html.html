<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets Inventory System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"], input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { background-color: #27ae60; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        .btn:hover { background-color: #219653; }
        .barcode-upload-box { background: #f8f9fa; border: 1px dashed #bdc3c7; padding: 10px; border-radius: 4px; margin-top: 8px; }
        .inventory-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #ddd; background: #fff; margin-bottom: 10px; border-radius: 4px; }
        .inventory-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; margin-right: 15px; }
        .item-details { flex-grow: 1; }
        .item-details p { margin: 4px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Add to Google Sheet Inventory</h2>
        <form id="inventoryForm">
            <div class="form-group">
                <label for="barcode">Barcode / SKU</label>
                <input type="text" id="barcode" placeholder="Scanned value will appear here" required>
                
                <div class="barcode-upload-box">
                    <label for="barcodeImageInput" style="font-weight: normal; font-size: 14px;">
                        🖼️ <strong>Scan Barcode from Photo/Library:</strong>
                    </label>
                    <input type="file" id="barcodeImageInput" accept="image/*">
                    <p id="scanStatus" style="font-size: 13px; margin: 6px 0 0 0; font-weight: bold;"></p>
                </div>
                
                <!-- Hidden engine container -->
                <div id="reader" style="display:none;"></div>
            </div>

            <div class="form-group">
                <label for="itemName">Item Name</label>
                <input type="text" id="itemName" placeholder="e.g., Office Chair" required>
            </div>

            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" value="1" min="1" required>
            </div>

            <div class="form-group">
                <label for="itemImage">Take/Upload Item Image</label>
                <input type="file" id="itemImage" accept="image/*" required>
            </div>

            <button type="submit" class="btn" id="submitBtn">Send to Google Sheet</button>
        </form>
    </div>

    <div class="card">
        <h2>Recent Sheet Entries</h2>
        <div id="inventoryList">Loading latest rows...</div>
    </div>
</div>

<script>
    // --- PASTE YOUR GOOGLE WEB APP URL HERE ---
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwuDLRFUIG591U1mQs9DLfkXh9TU16nAgv77vBvLzVt5WUKhmNiHsr-G38biJ2NMs-a/exec"; 

    // Initialize hidden scanner engine
    const html5QrCode = new Html5Qrcode("reader");

    fetchSheetData();

    // --- DECODE BARCODE FROM PHOTO & LOOKUP ONLINE ---
    document.getElementById('barcodeImageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const statusMsg = document.getElementById('scanStatus');
        
        if (!file) return;

        statusMsg.textContent = "Scanning image for barcode...";
        statusMsg.style.color = "#3498db";

        // Step 1: Read barcode value from image file
        html5QrCode.scanFile(file, true)
            .then(async (decodedText) => {
                document.getElementById('barcode').value = decodedText;
                statusMsg.textContent = "✓ Barcode detected! Searching online database...";
                statusMsg.style.color = "#27ae60";

                // Step 2: Query barcode online to autofill Item Name
                await lookupBarcodeOnline(decodedText);
            })
            .catch(err => {
                console.error("Scan error:", err);
                statusMsg.textContent = "❌ No barcode found in photo. Try taking a closer, clearer picture.";
                statusMsg.style.color = "#e74c3c";
            });
    });

    // Manual typing trigger: Lookup SKU if manually entered
    document.getElementById('barcode').addEventListener('blur', function() {
        const value = this.value.trim();
        if (value.length >= 8 && !document.getElementById('itemName').value) {
            lookupBarcodeOnline(value);
        }
    });

    // --- INTERNET BARCODE LOOKUP FUNCTION ---
    async function lookupBarcodeOnline(barcodeNum) {
        const statusMsg = document.getElementById('scanStatus');
        const itemNameInput = document.getElementById('itemName');

        try {
            const cleanBarcode = barcodeNum.replace(/[^0-9]/g, '');
            const response = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${cleanBarcode}`);
            const data = await response.json();

            if (data.items && data.items.length > 0) {
                const productTitle = data.items[0].title;
                itemNameInput.value = productTitle;
                statusMsg.textContent = `✓ Found product: "${productTitle}"`;
                statusMsg.style.color = "#27ae60";
            } else {
                statusMsg.textContent = "✓ Barcode read! (Product not found online, type name manually)";
                statusMsg.style.color = "#e67e22";
            }
        } catch (error) {
            console.warn("Online lookup error:", error);
            statusMsg.textContent = "✓ Barcode read! (Could not reach database, type name manually)";
            statusMsg.style.color = "#e67e22";
        }
    }

    // --- FORM SUBMISSION TO GOOGLE SCRIPT ---
    document.getElementById('inventoryForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = "Sending to Sheet...";

        const barcode = document.getElementById('barcode').value;
        const name = document.getElementById('itemName').value;
        const qty = document.getElementById('quantity').value;
        const imageFile = document.getElementById('itemImage').files[0];

        const reader = new FileReader();
        reader.onload = async function(event) {
            const base64String = event.target.result.split(',')[1];
            
            const payload = {
                barcode: barcode,
                name: name,
                quantity: qty,
                image: base64String,
                imageType: imageFile.type
            };

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                document.getElementById('inventoryForm').reset();
                document.getElementById('scanStatus').textContent = "";
                setTimeout(fetchSheetData, 2000);
            } catch (error) {
                alert("Error sending data: " + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Send to Google Sheet";
            }
        };

        if (imageFile) {
            reader.readAsDataURL(imageFile);
        }
    });

    // --- FETCH RECENT SHEET ENTRIES ---
    async function fetchSheetData() {
        const listContainer = document.getElementById('inventoryList');
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();

            if (data.length === 0) {
                listContainer.innerHTML = '<p>No items found in sheet.</p>';
                return;
            }

            listContainer.innerHTML = '';
            data.reverse().forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'inventory-item';
                itemDiv.innerHTML = `
                    <img src="${item.imageUrl.includes('http') ? item.imageUrl : 'https://placehold.co/80'}" alt="${item.name}">
                    <div class="item-details">
                        <strong>${item.name}</strong>
                        <p>Barcode: <code>${item.barcode}</code></p>
                        <p>Qty: ${item.quantity}</p>
                        <p><a href="${item.imageUrl}" target="_blank" style="color:#27ae60;">View Full Drive Image</a></p>
                    </div>
                `;
                listContainer.appendChild(itemDiv);
            });
        } catch (err) {
            listContainer.innerHTML = '<p style="color:#7f8c8d;">Rows updated successfully in Google Sheets.</p>';
        }
    }
</script>
</body>
</html>
